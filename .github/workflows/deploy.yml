# ─────────────────────────────────────────────────────────────────────────────
# Deploy — AI for EveryOne (Combined Workshop + Products)
#
# Triggers on every push to main (and can be run manually).
# Injects GitHub secrets → config.js → deploys to GitHub Pages.
#
# Required repository secrets:
#   GOOGLE_SHEET_URL   — Workshop Apps Script Web App URL
#   RAZORPAY_KEY_ID    — Razorpay publishable key
#   CSV_GITHUB_TOKEN   — Fine-grained PAT (Contents R+W on this repo)
#   LEADS_SHEET_URL    — Product leads Apps Script Web App URL
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dist/
        run: |
          mkdir -p dist
          cp index.html dist/index.html
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
